releases:
  - name: n8n
    namespace: n8n
    chart: oci://8gears.container-registry.com/library/n8n
    version: 1.0.15
    createNamespace: true
    values:
      - ingress:
          enabled: true
          className: traefik
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls.certresolver: main
          hosts:
            - host: n8n.example.com
              paths:
                - /
        # Service defaults to ClusterIP; override via main.service if needed
        main:
          persistence:
            enabled: true
            type: dynamic
            accessModes:
              - ReadWriteOnce
            size: 5Gi
          extraEnv:
            N8N_HOST:
              value: n8n.example.com
            N8N_PROTOCOL:
              value: https
            WEBHOOK_URL:
              value: https://n8n.example.com
